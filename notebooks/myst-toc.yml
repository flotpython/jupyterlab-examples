version: 1

project:
  toc:
    - file: 0-00-intro-nb.md
    - title: recipes
      # not (yet?) supported as of 2025 march
      # numbered: true
      children:
        - pattern: 1-[0-9]*
    - title: styles & spaces
      children:
        - pattern: 2-[0-9]*
    - title: graphics & widgets
      children:
        - pattern: 3-[0-9]*
    - title: execution
      children:
        - pattern: 4-[0-9]*
    - title: toc
      children:
        - file: 5-01-toc-plain.md
          title: a title set in the toc
          weirdo: should trigger some error
        - file: 5-02-title-nb.md
        - file: 5-03-titles-nb.md
        - file: 5-04-dummy-prune-nb.md
          title: using nbprune
        # here's how to define the corrige files with the hidden flag
        # a pattern: would work too
        - file: .teacher/5-04-dummy-prune-corrige-nb.md
          hidden: true
        # getting rid of the umbrella
        - title: multi-part TP
          children:
            - file: 5-05-part1-nb.md
            - file: 5-05-part2-nb.md
        # just for the contents to be available to other notebooks
        # but should not appear in the toc
        - file: 5-06-hidden-nb.md
          hidden: true
        # urls not yet supported in mystmd
        # see https://github.com/jupyter-book/mystmd/issues/1445
        - url: https://flotpython-exos-ds.readthedocs.io/en/main/ds-tps/images/README-images1-nb.html
          title: link to external TP
    - title: setup
      children:
        - pattern: 6-[0-9]*
    - title: slugs
      children:
        - pattern: 7-slugs/*.md
    - title: MyST Workshop
      children:
        - pattern: 8-*.md
    - title: Issue 2973
      children:
        - file: 2973/file1.md
        - file: 2973/file2.md
        - pattern: 2973/*.md
