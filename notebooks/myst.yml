# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: flotpython - examples with jupyterlite
  # I suspect the intention was maybe to use this for the title tooltip ?
  # in any case as of now 2024 june the title is used for the tooltip too (a bit silly)
  # and I can't see where this is used
  description: "dummy course to check for publication tooling"
  # this one causes additional buttons to be shown
  # in the upper right area (close to the github button)
  license: CC-BY-NC-SA-4.0
  # inserted under the title
  # would be nice if it could be limited to the cover page
  authors:
    - Thierry Parmentelat
  date: 2025-11-13
  github: https://github.com/flotpython/jupyterlab-examples
  keywords:
    - notebooks
    - MyST
    - Jupyter
    - jupyterlite
# bibliography: []
  settings:
    output_matplotlib_strings: warn
  jupyter:
    lite: true
  plugins:
    - https://raw.githubusercontent.com/choldgraf/myst-lightbox/main/src/index.mjs
    - manim.mjs

  static_files:
    - _static
    # - data

site:
  # OK
  # template: book-theme
  # OK
  # template: https://github.com/jupyter-book/myst-theme/releases/download/myst-to-react%401.3.1/book-theme.zip
  # KO
  # template: https://github.com/flotpython/myst-theme/releases/download/custom/book-theme.zip
  template: https://github.com/flotpython/myst-theme/releases/download/foo/book-theme.zip

  # used in the tab name
  title: jlab examples jlite
  # this would be for the horizontal header bar - not used here (yet)
  # nav: []
  # actions:
  #   - title: Learn More
  #     url: https://mystmd.org/guide
  domains: []
  options:
    favicon: media/flotpython-favicon.svg.ico
    logo: media/flotpython-favicon.svg
    # very visible in the header
    logo_text: With jupyter.lite = true
    style: _static/style.css
    # style:
    #   - _static/style_jb2.css
    #   - _static/style_local.css
    folders: true

extends:
  - myst-toc.yml
